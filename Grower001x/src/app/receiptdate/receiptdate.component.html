<div>
    <p style="color:white;padding:5px">Receipt Date From:</p>
  <input
    soho-datepicker
    id="standard"
    name="standard"
    dateFormat="dd/MM/yyyy"
    mode="standard"
    placeholder="Receipt Date"
      [(ngModel)]="fromdate"
    (ngModelChange)="onChange01($event)"
style="width:350px"
  />
</div>


<div>
  <p style="color:white;padding:5px;margin-top:10px">Receipt Date To:</p>
   <input
    soho-datepicker
    id="standard"
    name="standard"
    dateFormat="dd/MM/yyyy"
    mode="standard"
     [(ngModel)]="todate"
    placeholder="Receipt Date"
    (ngModelChange)="onChange02($event)"
style="width:350px"
  />
</div>
